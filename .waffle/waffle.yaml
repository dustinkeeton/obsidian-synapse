# wafflestack consumer config — https://github.com/dustinkeeton/wafflestack
#
# The agent/skill files under .claude/agents, .claude/skills, .codex/agents, and
# .agents/skills that are listed in .waffle/waffle.lock.json are RENDERED from
# the toolkit — edit the toolkit source, this config, or .waffle/extensions/
# instead of the rendered files, then re-render:
#
#   npx github:dustinkeeton/wafflestack#v0.13.0 render
#   npx github:dustinkeeton/wafflestack#v0.13.0 doctor --allow-missing   # drift check
#
# Account-specific values (git.botEmail, git.botName) live in the gitignored
# .waffle/waffle.local.yaml overlay; the git.* values below reference them via
# nested substitution, so renders that embed them stay gitignored.
targets: [ claude, codex, agents-dir ]
stacks:
  - docs-system
  - github-workflow
  - code-quality
  - obsidian-dev
  - orchestration
  - wafflestack
# Per-item pulls from the engineering-team bundle: Synapse needs the general
# architect and the remediating security agent, not the whole app-team roster.
include:
  - agents/lead-engineer
  - agents/security-engineer
# The toolkit's release skill tags `vX.Y.Z` and defers the tag push to
# waffle-release-hook. Obsidian requires the release tag to match manifest.json
# exactly, with no `v` prefix, and this repo tags from tag-on-version-bump.yml
# instead. The project-owned .claude/skills/release/SKILL.md encodes that plus
# the four-file version-bump lockstep, so the toolkit's copy stays out.
eject:
  - skills/release
config:
  git:
    cmd: git -c user.email={{git.botEmail}} -c user.name={{git.botName}}
    coAuthorTrailer: "Co-Authored-By: {{harness.assistantName}} <{{git.botEmail}}>"
    identitySection: |-
      All git operations MUST use the project bot identity:

      ```bash
      git -c user.email={{git.botEmail}} -c user.name={{git.botName}} <command>
      ```

      Never use a personal identity or the default git config for this project. Every agent-made commit must end with the attribution trailer:

      ```
      Co-Authored-By: {{harness.assistantName}} <{{git.botEmail}}>
      ```
  project:
    name: Synapse
    longName: the Synapse Obsidian plugin
    slug: synapse
    buildCmd: node esbuild.config.mjs production
    testCmd: npm test
    typecheckCmd: npx tsc --noEmit --skipLibCheck
  issue:
    inferenceLabel: Needs Inference
  doctor:
    toolkitRef: github:dustinkeeton/wafflestack#v0.13.0
    # This repo deliberately gitignores some renders (.agents/, .codex/, and the
    # .claude skills that embed the local overlay) — tolerate absent files in CI,
    # still fail on hand-edited ones. Keeps the workflow managed instead of ejected.
    flags: --allow-missing
  pm:
    brief: >-
      You are the senior product manager for **Synapse**, an Obsidian plugin
      that elaborates, transcribes, enriches, summarizes, organizes, and
      connects notes with AI. The audience is Obsidian users who live in
      plain-Markdown vaults — so write in their vocabulary (notes, vaults,
      commands, settings), never in engineering or marketing jargon.
    principles: |-
      - **Non-destructive by default.** Synapse proposes, the user disposes — any story that mutates a note needs an explicit user action and an undo path.
      - **The vault is private.** Any flow that sends note content to an AI provider must make that obvious and opt-in; never design silent uploads.
      - **Fit the platform.** Stories must respect Obsidian UX conventions and the community-plugin guidelines, and must flag desktop-only capabilities (yt-dlp, ffmpeg) explicitly.
    handoffs: |-
      - Feasibility, architecture, or dependency questions → `lead-engineer`
      - Obsidian API / platform constraints → `plugin-architect`
      - Security or privacy implications → `security-engineer`
      - Brand voice, naming, user-facing copy → `brand-manager`
      - Scheduling, assignment, and execution → `project-manager`
  lead:
    stack: |-
      - **TypeScript** (strict) on the Obsidian plugin API (`obsidian` typings pinned in `package.json`).
      - **esbuild** (`esbuild.config.mjs`) for bundling; `tsc --noEmit` for typechecking only.
      - **Vitest** for tests, using the centralized Obsidian mock (`src/__mocks__/`).
      - **No runtime npm dependencies** — HTTP via Obsidian's `requestUrl`/`fetch`; media tooling via external `yt-dlp`/`ffmpeg` processes (desktop only).
    structure: |-
      - `src/main.ts` is lifecycle glue only. Every feature lives in `src/<feature>/` behind an `index.ts` public API (module class with `onload`/`onunload`), with feature-specific types in its `types.ts`.
      - Feature modules may depend on `src/shared/` but never on each other; the one documented exception is VideoModule → AudioModule.
      - Import through `feature/index.ts`, never internal files. Files kebab-case, classes PascalCase, named exports.
      - The full standard lives in the `codebase-architecture` skill — read it before ruling on structure questions.
    delegation: >-
      Obsidian platform and UI work to `plugin-architect`, the transcription
      pipeline to `transcription-engineer`, the elaboration system to
      `elaboration-designer`, security to `security-engineer`, visual assets to
      `designer`, docs to `docs-agent`/`docs-human`. Use the `Agent` tool to
      invoke them.
  tdd:
    priorityTiers: |-
      ### Tier 1 — Pure functions (no mocking needed, write these first)
      | Module | Key functions |
      |--------|--------------|
      | `shared/validation.ts` | `sanitizeUrl`, `sanitizePath`, `sanitizeAIResponse`, `ensureWithinVault` |
      | `video/url-detector.ts` | `detectPlatform`, `isSupportedUrl` |
      | `shared/file-utils.ts` | `wordCount` |
      | `shared/api-utils.ts` | `withRetry`, `sleep` |
      | `settings.ts` | `DEFAULT_SETTINGS` shape, `MODEL_OPTIONS` consistency |

      ### Tier 2 — Units with injectable/mockable dependencies
      | Module | Mock surface |
      |--------|-------------|
      | `elaboration/detector.ts` | `App.vault.read`, `App.metadataCache` |
      | `elaboration/proposer.ts` | `AIClient`, `App.vault.adapter.read`, `MetadataCache` |
      | `elaboration/proposal-store.ts` | `App.vault.adapter` (CRUD) |
      | `shared/ai-client.ts` | `requestUrl` from obsidian |
      | `audio/transcriber.ts` | `global.fetch` |
      | `audio/post-processor.ts` | `AIClient.complete()` |
      | `video/audio-extractor.ts` | `child_process.execFile` |

      ### Tier 3 — Module orchestrators (integration-level)
      | Module | What to verify |
      |--------|---------------|
      | `elaboration/index.ts` | scan → detect → propose → store pipeline |
      | `audio/index.ts` | transcribe → post-process → save pipeline, inline insertion |
      | `video/index.ts` | URL → extract → transcribe → save pipeline |

      ### Do NOT unit test
      - `main.ts` (lifecycle glue — extract `deepMerge` to `shared/` if testing needed)
      - Modal/View UI classes (extract testable logic to pure functions instead)
      - `settings-tab.ts` (pure UI wiring)
    moduleBoundaries: |-
      **Import boundaries** — Feature modules (`elaboration/`, `audio/`, `video/`) must not import from each other, except the documented `video/ → audio/` dependency. Consider an architectural test that scans imports.
    workflows: |-
      ### Adding a new detection heuristic (elaboration)
      1. Add type variant to `DetectionReason` in `types.ts`
      2. Write failing detector test with concrete input/expected output
      3. Implement detection logic, run until green
      4. Write prompt-building test for the new reason type
      5. Add settings flag test, then implement the flag
      6. Add edge case tests

      ### Adding a new transcription provider
      1. Write tests: provider dispatch, missing API key, request format, response mapping, HTTP errors
      2. Update types in `settings.ts`
      3. Implement provider method in `Transcriber`
      4. Write post-processor integration test
      5. Add settings UI (not unit tested)

      ### Adding a new media source (e.g., Instagram)
      1. Write URL detection tests for the new platform
      2. Add regex and detection logic to `url-detector.ts`
      3. Write audio extraction tests (mock `execFile`)
      4. Verify `yt-dlp` handles the platform
      5. Write integration test for full pipeline
  arch:
    settingsType: SynapseSettings
    depExceptions: VideoModule → AudioModule (documented exception)
  security:
    skillGitignore: '`.env`, `data.json`, `.synapse/`'
    dataDir: '`.synapse/`'
    externalTools: yt-dlp, ffmpeg
    mediaFetchTool: yt-dlp
    agentGitignore: .env, data.json, .synapse/, node_modules/
    threatModel: |-
      - Calls external APIs (OpenAI, Anthropic, Deepgram) with user-provided API keys
      - Executes external processes (yt-dlp, ffmpeg) with user-provided URLs and file paths
      - Reads/writes files within an Obsidian vault
      - Stores configuration including API keys via Obsidian's data persistence
  brand:
    assetsDir: assets/brand/
    background: "#1e1e1e"
  plugin:
    id: synapse
    name: Synapse
    description: Flesh out and elaborate on notes with AI assistance
    author: Dustin Keeton
    classPrefix: Synapse
  roster:
    specialistTable: |-
      | Agent | Specialty |
      |---|---|
      | `transcription-engineer` | Audio/video transcription pipeline (`src/audio/`, `src/video/`) |
      | `elaboration-designer` | Note elaboration and proposal system (`src/elaboration/`) |
      | `plugin-architect` | Plugin features, UI, settings, commands (`src/enrichment/`, `src/summarize/`, `src/tidy/`, `src/views/`) |
      | `lead-engineer` | Codebase structure, shared utilities, conventions (`src/shared/`, cross-cutting) |
      | `security-engineer` | Security auditing and fixes |
      | `docs-agent` | Machine-readable documentation (AGENTS.md files) |
      | `docs-human` | Human-readable documentation (DECISIONS.md, STATUS.md, ARCHITECTURE.md) |
    classificationTable: |-
      | Keywords / paths in issue | Agent |
      |---|---|
      | `src/audio/`, `src/video/`, audio, transcription, whisper, deepgram, yt-dlp, youtube, tiktok | `transcription-engineer` |
      | `src/elaboration/`, elaborate, proposal, placeholder, detection | `elaboration-designer` |
      | `src/enrichment/`, enrich, tags, links, weights | `plugin-architect` |
      | `src/summarize/`, summarize, summary, URL fetching | `plugin-architect` |
      | `src/tidy/`, `src/views/`, UI, modal, settings-tab, sidebar, tidy, formatting | `plugin-architect` |
      | `src/shared/`, validation, ai-client, file-utils | `lead-engineer` |
      | `src/main.ts`, plugin lifecycle, onload, commands | `plugin-architect` |
      | security, injection, secrets, .gitignore | `security-engineer` |
      | AGENTS.md, machine docs, module registry | `docs-agent` |
      | DECISIONS.md, STATUS.md, ARCHITECTURE.md | `docs-human` |
      | architecture, structure, naming, dependency, circular | `lead-engineer` |
      | `assets/brand/`, logo, icon, banner, visual asset, SVG | `designer` |
      | brand, branding, voice, tone, name treatment, brand audit | `brand-manager` |
    labelFallback: |-
      | Label | Agent |
      |---|---|
      | `bug` | `plugin-architect` |
      | `enhancement` | `plugin-architect` |
      | `documentation` | `docs-agent` |
      | `question` | `lead-engineer` |
    rootFiles: "`main.ts`, `settings.ts`, `settings-tab.ts`"
    sharedModule: "`src/shared/`"
    moduleDependencies: "`src/video/` depends on `src/audio/` — serialize audio-first"
    rootFileExample: "`main.ts`"
  audit:
    # Domain architect for the Obsidian-guideline compliance step (the toolkit
    # default is the general lead-engineer).
    complianceAgentType: plugin-architect
    complianceLabel: Obsidian compliance
    complianceFrontmatterLabel: Obsidian submission-guideline compliance
    complianceTaskLabel: obsidian compliance
    complianceAgentName: obsidian-compliance
    complianceDescription: "Verify the codebase still meets the Obsidian community
      plugin submission guidelines (manifest correctness, lifecycle cleanup, no
      internal/deprecated APIs, DOM safety, mobile/`isDesktopOnly` accuracy,
      command & UI-copy conventions). Implement fixes."
    compliancePrompt: |-
      ### Obsidian Compliance (Task 3)
      Verify the plugin still satisfies the Obsidian community plugin submission guidelines, per `.claude/skills/obsidian-plugin-dev/SKILL.md` and the official policies (developer.obsidian.md plugin guidelines + the `obsidianmd/obsidian-releases` submission checklist). Audit and fix:
      - **manifest.json**: required fields present and valid (`id`, `name`, `version` matching the release, `minAppVersion`, `description`, `author`, `authorUrl`, and an `isDesktopOnly` flag that matches actual Node/Electron/desktop-only API usage); `id` is unique, lowercase-kebab, and contains neither "obsidian" nor "plugin"; `versions.json` kept in sync with `minAppVersion`.
      - **Lifecycle & cleanup**: every event, interval, and DOM listener is registered via `registerEvent` / `registerInterval` / `registerDomEvent` (or explicitly torn down in `onunload`); no leaked timers; `onunload` does not detach leaves it didn't create.
      - **API hygiene**: no internal/undocumented APIs (e.g. `app.internalPlugins`, private fields) and no deprecated calls; use `this.app` rather than the global `app`; use `normalizePath` for vault paths; prefer `Vault.process` / `FileManager` over raw adapter writes; gate desktop-only Node usage behind the existing desktop assertions.
      - **DOM safety**: no `innerHTML` / `outerHTML` / `insertAdjacentHTML` with dynamic content — build nodes with `createEl` / `createDiv`; move inline styles to CSS classes in `styles.css`.
      - **Commands & UI copy**: command names in sentence case, no plugin-name prefix and not containing the word "plugin"; settings headings follow Obsidian conventions (sentence case, no "Settings for…").
      - **Repo hygiene**: `main.js` / `manifest.json` / `styles.css` are the published release artifacts; `LICENSE` and `README` present; no committed secrets; any network usage is disclosed in the README.
      Implement fixes directly (do not just report), then verify with `npx tsc --noEmit` and the production build. Respect the project's deliberate patterns (e.g. the type-only audio→video back-edge, desktop gating via `loadNodeModules`) — flag, don't "fix", anything that is intentional.
