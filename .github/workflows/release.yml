name: Release

# Obsidian requires the release tag to exactly match manifest.json's version,
# so tags have no "v" prefix (e.g. "1.0.0", not "v1.0.0").
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_call:
    inputs:
      tag:
        description: 'Tag name (e.g. 1.0.0) passed from tag-on-version-bump'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Determine tag version
        id: tag
        run: |
          # inputs.tag and github.ref_name are bare versions like "1.0.0"
          RAW_TAG="${{ inputs.tag || github.ref_name }}"
          echo "version=$RAW_TAG" >> "$GITHUB_OUTPUT"
          echo "name=$RAW_TAG" >> "$GITHUB_OUTPUT"

      - name: Verify versions
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          MANIFEST_MIN=$(node -p "require('./manifest.json').minAppVersion")
          VERSIONS_MIN=$(node -p "require('./versions.json')['$MANIFEST_VERSION']")
          if [ "$MANIFEST_MIN" != "$VERSIONS_MIN" ]; then
            echo "ERROR: versions.json minAppVersion ($VERSIONS_MIN) does not match manifest.json minAppVersion ($MANIFEST_MIN) for version $MANIFEST_VERSION"
            exit 1
          fi
          TAG_VERSION="${{ steps.tag.outputs.version }}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: manifest.json version ($MANIFEST_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi

      - name: Build
        run: node esbuild.config.mjs production

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
