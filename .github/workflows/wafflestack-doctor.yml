# Ejected from wafflestack management (see `eject:` in .waffle.yaml) — project-owned.
# Fails CI when a managed file drifts from .waffle.lock.json: either a rendered file
# was hand-edited, or the repo never committed its render + lock.
# --allow-missing: this repo deliberately gitignores some renders (.agents/, .codex/,
# and the .claude skills that embed the local overlay), so absent files are tolerated;
# hand-edited (modified) files still fail.
name: WaffleStack doctor

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege: doctor only reads the checked-out tree — no writes, no secrets.
permissions:
  contents: read

# Cancel superseded runs on the same pull request; always let main-branch checks finish.
concurrency:
  group: wafflestack-doctor-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      - name: Check wafflestack drift
        run: npx --yes github:dustinkeeton/wafflestack#v0.6.0 doctor --allow-missing
