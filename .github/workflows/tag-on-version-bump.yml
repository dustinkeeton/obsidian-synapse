name: Tag on version bump

on:
  push:
    branches: [main]
    paths: ['manifest.json']

# Required so the `tag` job can push the tag, and so the reusable `release`
# workflow call can be granted `contents: write`. A called workflow cannot have
# more permissions than its caller; without this the run fails at startup when
# the repo default workflow permission is read-only.
permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.check.outputs.tag }}
      created: ${{ steps.check.outputs.created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(jq -r .version manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Obsidian requires the release tag to exactly match manifest.json's
      # version, so the tag has no "v" prefix (e.g. "1.0.0", not "v1.0.0").
      - name: Check if tag exists
        id: check
        run: |
          TAG="${{ steps.version.outputs.version }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: tag
    if: needs.tag.outputs.created == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
