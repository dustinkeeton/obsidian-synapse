name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit --skipLibCheck

      - name: Test
        run: npm test

      - name: Version consistency check
        run: node scripts/version-bump.mjs --check

      - name: Build
        run: node esbuild.config.mjs production
